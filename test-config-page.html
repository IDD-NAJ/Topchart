<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Config Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #006994;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #005577;
        }
        .debug-output {
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <h1>Admin Config Test Page</h1>
    <p>This page tests the reseller form configuration API directly.</p>
    
    <div class="form-group">
        <label for="application_fee">Application Fee:</label>
        <input type="number" id="application_fee" step="0.01" value="100.00">
    </div>
    
    <div class="form-group">
        <label for="currency">Currency:</label>
        <input type="text" id="currency" value="GHS">
    </div>
    
    <button onclick="loadConfig()">Load Config</button>
    <button onclick="saveConfig()">Save Config</button>
    <button onclick="clearDebug()">Clear Debug</button>
    
    <div id="debug-output" class="debug-output"></div>

    <script>
        let currentConfig = {
            business_name: { enabled: true, required: true },
            business_address: { enabled: true, required: false },
            business_phone: { enabled: true, required: false },
            business_email: { enabled: true, required: false },
            business_type: { enabled: true, required: false },
            application_fee: 100.00,
            currency: "GHS",
            require_payment_before_approval: true
        };

        function debug(message, type = 'info') {
            const output = document.getElementById('debug-output');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            output.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            output.scrollTop = output.scrollHeight;
        }

        function clearDebug() {
            document.getElementById('debug-output').innerHTML = '';
        }

        async function loadConfig() {
            debug('🔍 DEBUG: Loading configuration...');
            try {
                const res = await fetch("/api/test-reseller-config", {
                    credentials: "include"
                });
                debug('📡 Response status: ' + res.status);
                
                if (res.status === 401) {
                    debug('❌ Authentication required - please use the test-with-auth.html page first', 'error');
                    return;
                }
                
                const data = await res.json();
                debug('🔍 DEBUG: Load response data: ' + JSON.stringify(data, null, 2));

                if (data.success) {
                    debug('🔍 DEBUG: Setting config from API: ' + JSON.stringify(data.config, null, 2));
                    currentConfig = data.config;
                    document.getElementById('application_fee').value = currentConfig.application_fee;
                    document.getElementById('currency').value = currentConfig.currency;
                    debug('✅ Config loaded successfully');
                    debug('💰 Current application_fee: ' + currentConfig.application_fee);
                } else {
                    debug('🔍 DEBUG: Load failed: ' + data.error, 'error');
                }
            } catch (error) {
                debug('🔍 DEBUG: Load error: ' + error.message, 'error');
            }
        }

        async function saveConfig() {
            const newConfig = {
                ...currentConfig,
                application_fee: parseFloat(document.getElementById('application_fee').value) || 0,
                currency: document.getElementById('currency').value
            };

            debug('🔍 DEBUG: Starting saveConfig with current config: ' + JSON.stringify(newConfig, null, 2));
            
            try {
                const res = await fetch("/api/test-reseller-config", {
                    method: "PUT",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ config: newConfig })
                });
                debug('🔍 DEBUG: Save response status: ' + res.status);

                const data = await res.json();
                debug('🔍 DEBUG: Save response data: ' + JSON.stringify(data, null, 2));

                if (!res.ok || !data.success) {
                    debug('🔍 DEBUG: Save failed: ' + data.error, 'error');
                    return;
                }
                debug('🔍 DEBUG: Save successful, reloading config');
                debug('✅ Configuration saved', 'success');
                // Reload config to verify it was saved correctly
                await loadConfig();
            } catch (error) {
                debug('🔍 DEBUG: Network error during save: ' + error.message, 'error');
            }
        }

        // Load config on page load
        window.onload = function() {
            debug('🚀 Page loaded, loading initial config...');
            loadConfig();
        };
    </script>
</body>
</html>
